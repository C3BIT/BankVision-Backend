version: '3.8'

services:
  backend:
    build: .
    restart: unless-stopped
    # Internal port set by Dockerfile (usually 3000), Coolify auto-detects
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
    networks:
      - mtb-network

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --requirepass VbrmRedis2024Secure
    volumes:
      - redis_data:/data
    networks:
      - mtb-network

networks:
  mtb-network:
    external: true
    name: mtb-network

volumes:
  redis_data:
