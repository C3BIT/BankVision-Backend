services:
  nginx:
    image: nginx:1.29.7-alpine
    container_name: bankvision-api-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "8443:8443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/ssl/bankvision:/etc/ssl/bankvision:ro
      - ./uploads:/app/uploads:ro
    depends_on:
      - backend
    networks:
      - bankvision-net

  backend:
    image: bankvision/backend:uat
    build: .
    container_name: bankvision-backend
    restart: unless-stopped
    expose:
      - "5094"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bankvision-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5094/api/dev/health').then(r=>{if(!r.ok)throw r;process.exit(0)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  redis:
    image: redis:7.4.8-alpine
    container_name: bankvision-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - bankvision-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  bankvision-net:
    driver: bridge

volumes:
  redis-data:
