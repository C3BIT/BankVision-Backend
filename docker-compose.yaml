services:
  backend:
    build: .
    restart: unless-stopped
    # Internal port set by Dockerfile (usually 3000), Coolify auto-detects
    # Removing host port mapping to avoid "port already allocated" errors
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
    networks:
      - mtb-network

networks:
  mtb-network:
    external: true
    name: mtb-network
